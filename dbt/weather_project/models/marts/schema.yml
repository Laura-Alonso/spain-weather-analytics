version: 2

models:
  - name: mart_weather_daily
    description: "Daily weather aggregations per city"
    columns:
      - name: observation_date
        description: "Date of the weather observation"
        tests:
          - not_null
      - name: city
        description: "Name of the city"
        tests:
          - not_null
      - name: latitude
        description: "Geographic latitude of the city"
      - name: longitude
        description: "Geographic longitude of the city"          
      - name: country
        description: "Name of the country"
        tests:
          - not_null
      - name: avg_temperature
        description: "Average day temperature in Celsius"
      - name: min_temperature
        description: "Minimum day temperature in Celsius"
      - name: max_temperature
        description: "Maximum day temperature in Celsius"
      - name: thermal_range
        description: "Thermal day temperature range"
      - name: total_precipitation
        description: "Total day precipitation amount in mm"
      - name: rainy_hours
        description: "Total hours with precipitation in the day"
      - name: max_wind_speed
        description: "Maximum day wind speed in km/h"
      - name: avg_wind_speed
        description: "Average day wind speed in km/h"
      - name: max_wind_gusts
        description: "Maximum day wind gusts speed in km/h"
      - name: avg_humidity
        description: "Average day relative humidity percentage (0-100)"       
      - name: avg_pressure
        description: "Average day atmospheric pressure in hPa"
      - name: tech_key
        description: "Deterministic hash key generated from city and date. Used as unique row identifier for joins and traceability across models."
        tests:
          - unique
          - not_null         
      - name: update_ts
        description: "Timestamp when dbt last processed this row"
      - name: ingestion_ts
        description: "Timestamp when the row was loaded into ClickHouse"

  - name: mart_weather_hourly
    description: "Enriched hourly weather observations per city"
    columns:
      - name: observation_timestamp
        description: "Timestamp of the weather observation"
        tests:
          - not_null
      - name: city
        description: "Name of the city"
        tests:
          - not_null
      - name: latitude
        description: "Geographic latitude of the city"
      - name: longitude
        description: "Geographic longitude of the city"          
      - name: country
        description: "Name of the country"
        tests:
          - not_null
      - name: temperature
        description: "Temperature in Celsius"
      - name: precipitation
        description: "Precipitation amount in mm"
      - name: wind_speed
        description: "Wind speed in km/h"
      - name: wind_gusts
        description: "Wind gusts speed in km/h"
      - name: humidity
        description: "Relative humidity percentage (0-100)"       
      - name: pressure
        description: "Atmospheric pressure in hPa"
      - name: tech_key
        description: "Deterministic hash key generated from city and timestamp. Used as unique row identifier for joins and traceability across models."
        tests:
          - unique
          - not_null        
      - name: update_ts
        description: "Timestamp when dbt last processed this row"
      - name: ingestion_ts
        description: "Timestamp when the row was loaded into ClickHouse"        