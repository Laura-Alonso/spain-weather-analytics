version: 2

sources:
  - name: weather
    database: weather
    schema: weather
    description: "Raw weather data ingested from open-meteo API"
    tables:
      - name: dim_city
        description: "City dimension table with geographic coordinates"
        columns:
          - name: city_id
            description: "Primary key for city"
            tests:
              - unique
              - not_null
          - name: city_name
            description: "Name of the city"
            tests:
              - not_null
          - name: latitude
            description: "Geographic latitude of the city"
            tests:
              - not null
          - name: longitude
            description: "Geographic longitude of the city"
            tests:
              - not null
          - name: country_id
            description: "Foreign key referencing dim_country"
            tests:
              - not_null
              - relationships:
                  to: source('weather', 'dim_country')
                  field: country_id

      - name: dim_country
        description: "Country dimension table"
        columns:
          - name: country_id
            description: "Primary key for country"
            tests:
              - unique
              - not_null
          - name: country_name
            description: "Name of the country"
            tests:
              - not_null

      - name: raw_weather_2years
        description: "Historical weather data covering the last 2 years"
        columns:
          - name: timestamp
            description: "Datetime of the weather observation"
            tests:
              - not_null
          - name: city_id
            description: "Foreign key referencing dim_city"
            tests:
              - not_null
              - relationships:
                  to: source('weather', 'dim_city')
                  field: city_id
          - name: temperature
            description: "Temperature in Celsius"
          - name: wind_speed
            description: "Wind speed in km/h"
          - name: wind_gusts
            description: "Wind gusts speed in km/h"
          - name: precipitation
            description: "Precipitation amount in mm"
          - name: humidity
            description: "Relative humidity percentage (0-100)"
          - name: pressure
            description: "Atmospheric pressure in hPa"
          - name: ingestion_ts
            description: "Timestamp when the row was loaded into ClickHouse"

      - name: raw_weather_hourly
        description: "Hourly weather data — live feed"
        columns:
          - name: timestamp
            description: "Datetime of the weather observation"
            tests:
              - not_null
          - name: city_id
            description: "Foreign key referencing dim_city"
            tests:
              - not_null
              - relationships:
                  to: source('weather', 'dim_city')
                  field: city_id
          - name: temperature
            description: "Temperature in Celsius"
          - name: wind_speed
            description: "Wind speed in km/h"
          - name: wind_gusts
            description: "Wind gusts speed in km/h"
          - name: precipitation
            description: "Precipitation amount in mm"
          - name: humidity
            description: "Relative humidity percentage (0-100)"
          - name: pressure
            description: "Atmospheric pressure in hPa"
          - name: ingestion_ts
            description: "Timestamp when the row was loaded into ClickHouse"
